<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presente via Pix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎁 Presenteie os Noivos</h1>

    <p class="descricao">
      Caso prefira, você pode nos presentear via Pix 💖
    </p>

    <div class="qr-container">
      <img src="PIX.jpeg" alt="QR Code Pix">
    </div>

    <div class="pix-box">
      <input 
        type="text" 
        id="pixKey" 
        value="00020126360014BR.GOV.BCB.PIX0114+55319860477355204000053039865802BR5925LORRANE RODRIGUES DA SILV6014BELO HORIZONTE62250521WAIhUcneDyNVY1YDtcaqj6304B8C3" 
        readonly
      >
      <button onclick="copiarPix()">Copiar</button>
    </div>

    <p id="msg"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
